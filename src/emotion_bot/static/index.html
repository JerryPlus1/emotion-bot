<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Emotion Bot</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel left-panel">
        <div class="brand">
          <div class="brand-mark">EB</div>
          <div>
            <h1>Emotion Bot</h1>
            <p id="healthText">本地模型待连接</p>
          </div>
        </div>

        <section class="control-section">
          <label for="userId">用户</label>
          <div class="inline-field">
            <input id="userId" type="text" value="default" autocomplete="off" />
            <button id="refreshMemoryBtn" class="icon-button" type="button" title="刷新记忆">
              <i data-lucide="refresh-cw"></i>
            </button>
          </div>
        </section>

        <section class="control-section">
          <label for="memoryMode">记忆模式</label>
          <select id="memoryMode">
            <option value="auto" selected>自动</option>
            <option value="always">始终</option>
            <option value="off">关闭</option>
          </select>
        </section>

        <section class="control-section sliders">
          <div class="range-row">
            <label for="memoryWeight">长期记忆</label>
            <output id="memoryWeightValue">0.90</output>
          </div>
          <input id="memoryWeight" type="range" min="0" max="2" step="0.05" value="0.9" />

          <div class="range-row">
            <label for="historyWeight">聊天历史</label>
            <output id="historyWeightValue">0.55</output>
          </div>
          <input id="historyWeight" type="range" min="0" max="2" step="0.05" value="0.55" />

          <div class="range-row">
            <label for="documentWeight">知识库</label>
            <output id="documentWeightValue">0.65</output>
          </div>
          <input id="documentWeight" type="range" min="0" max="2" step="0.05" value="0.65" />
        </section>

        <section class="control-section">
          <label for="scenarioInput">当前场景</label>
          <input id="scenarioInput" type="text" placeholder="工作 / 学习 / 睡前 / 压力" />
        </section>

        <section class="control-section">
          <div class="toggle-row">
            <span>语音输出</span>
            <label class="switch">
              <input id="ttsToggle" type="checkbox" />
              <span></span>
            </label>
          </div>
        </section>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div class="header-copy">
            <h2>聊天</h2>
            <p id="sessionMeta">自动判断是否需要记忆</p>
          </div>
          <div class="header-actions">
            <a class="toolbar-button secondary" href="/memory-lab">
              <i data-lucide="flask-conical"></i>
              <span>记忆实验室</span>
            </a>
            <button id="proactiveBtn" class="toolbar-button" type="button">
              <i data-lucide="scan-heart"></i>
              <span>主动检查</span>
            </button>
          </div>
        </header>

        <section id="proactiveBanner" class="proactive-banner hidden"></section>
        <section id="messages" class="messages" aria-live="polite"></section>

        <form id="chatForm" class="composer">
          <textarea id="messageInput" rows="3" placeholder="输入消息，按 Enter 发送，Shift + Enter 换行"></textarea>
          <div class="composer-actions composer-actions-wide">
            <button id="clearBtn" class="toolbar-button secondary compact" type="button">
              <i data-lucide="eraser"></i>
              <span>清屏</span>
            </button>
            <button id="startTalkBtn" class="toolbar-button secondary compact" type="button">
              <i data-lucide="message-circle-heart"></i>
              <span>主动对话</span>
            </button>
            <button id="sendBtn" class="toolbar-button primary compact" type="submit">
              <i data-lucide="send"></i>
              <span>发送</span>
            </button>
          </div>
        </form>
      </main>

      <aside class="panel right-panel">
        <section class="control-section">
          <h3>用户画像</h3>
          <pre id="profileSummary">暂无画像</pre>
        </section>

        <section class="control-section">
          <h3>相关上下文</h3>
          <div id="contextList" class="context-list"></div>
        </section>

        <section class="control-section">
          <h3>知识库</h3>
          <input id="docTitle" type="text" placeholder="标题" />
          <div class="file-card">
            <label class="file-picker" for="docFile">
              <span class="file-icon"><i data-lucide="file-up"></i></span>
              <span class="file-copy">
                <strong id="docFileName">选择知识文件</strong>
                <small id="docFileMeta">支持 txt / md / csv / json / log</small>
              </span>
              <span class="file-action">浏览</span>
            </label>
            <input id="docFile" class="visually-hidden" type="file" accept=".txt,.md,.markdown,.csv,.json,.log,text/*,application/json" />
            <div class="file-options">
              <label for="docEncoding">编码</label>
              <select id="docEncoding" title="文件编码">
                <option value="utf-8" selected>UTF-8</option>
                <option value="gb18030">GB18030</option>
              </select>
            </div>
          </div>
          <textarea id="docContent" rows="5" placeholder="粘贴知识文本"></textarea>
          <button id="ingestBtn" class="toolbar-button" type="button">
            <i data-lucide="database-zap"></i>
            <span>写入</span>
          </button>
        </section>

        <section class="control-section memory-list-section">
          <h3>长期记忆</h3>
          <div id="memoryList" class="memory-list"></div>
        </section>
      </aside>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
